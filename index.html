<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATN - Node-Graph Generation Pipeline</title>
    <!-- Litegraph.js CSS -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/litegraph.js@0.7.10/css/litegraph.css">
    <!-- Google Model Viewer for 3D rendering -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: rgba(30, 30, 35, 0.75);
            --border-color: #2e2e35;
            --accent-color: #4f46e5;
            --accent-hover: #6366f1;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow: hidden;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Top header control bar */
        header {
            height: 60px;
            background-color: #1a1a1e;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .logo-section h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section span {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: #0d0d0f;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2px 8px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-muted);
            margin-right: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .input-group input {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 13px;
            width: 250px;
            padding: 6px;
            outline: none;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background-color: var(--accent-hover);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        button.secondary {
            background-color: #27272a;
            border: 1px solid #3f3f46;
        }

        button.secondary:hover {
            background-color: #3f3f46;
            box-shadow: none;
        }

        /* Status indicator */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ef4444;
            display: inline-block;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        /* Canvas graph editor container */
        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: calc(100% - 60px);
        }

        #graphcanvas {
            width: 100%;
            height: 100%;
            background-color: #16161a;
            display: block;
        }

        /* floating logs panel */
        #log-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 200px;
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        #log-panel h3 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #log-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #a7f3d0;
            line-height: 1.5;
            background-color: rgba(0,0,0,0.3);
            border-radius: 4px;
            padding: 6px;
        }

        /* Custom model-viewer container to embed inside node html */
        .node-3d-container {
            width: 100%;
            height: 100%;
            background-color: #08080a;
            position: relative;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* Litegraph style override */
        .litegraph .lgraphcanvas {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="logo-section">
            <h1>DATN: AUTOMATED 3D SCENE PIPELINE</h1>
            <span>Giao diện Node-Graph ComfyUI</span>
        </div>
        <div class="controls">
            <div class="input-group">
                <label>Kaggle API URL</label>
                <input type="text" id="ngrok-url" placeholder="https://xxxx.ngrok-free.app" value="">
                <span class="status-dot" id="status-indicator"></span>
            </div>
            <button id="btn-connect" class="secondary">Kết nối</button>
            <button id="btn-run">▶ Queue Prompt</button>
        </div>
    </header>
    
    <div id="canvas-container">
        <canvas id="graphcanvas"></canvas>
        
        <!-- Logs terminal -->
        <div id="log-panel">
            <h3>Terminal Logs <span id="btn-clear-logs" style="cursor:pointer; text-decoration: underline;">Clear</span></h3>
            <div id="log-content">Chưa kết nối máy chủ Kaggle...</div>
        </div>
    </div>
</div>

<!-- Litegraph.js dependencies -->
<script type="text/javascript" src="https://unpkg.com/litegraph.js@0.7.10/build/litegraph.js"></script>

<script>
    // Global API connection configuration
    let backendUrl = "";
    let isConnected = false;

    // Helper to log inside terminal panel
    function writeLog(message, type = "info") {
        const logContent = document.getElementById("log-content");
        const time = new Date().toLocaleTimeString();
        let color = "#a7f3d0"; // green-ish
        if (type === "error") color = "#fca5a5"; // red
        if (type === "warning") color = "#fde047"; // yellow
        if (type === "system") color = "#60a5fa"; // blue

        logContent.innerHTML += `<div style="color: ${color}">[${time}] ${message}</div>`;
        logContent.scrollTop = logContent.scrollHeight;
    }

    document.getElementById("btn-clear-logs").onclick = () => {
        document.getElementById("log-content").innerHTML = "";
    };

    // Test API connection
    document.getElementById("btn-connect").onclick = async () => {
        let url = document.getElementById("ngrok-url").value.trim();
        if (!url) {
            writeLog("Vui lòng nhập đường dẫn Ngrok!", "error");
            return;
        }
        if (url.endsWith("/")) url = url.slice(0, -1);

        writeLog(`Đang kiểm tra kết nối tới: ${url}...`, "system");
        try {
            const res = await fetch(`${url}/api/health`, { method: 'GET' });
            if (res.ok) {
                const data = await res.json();
                backendUrl = url;
                isConnected = true;
                document.getElementById("status-indicator").classList.add("connected");
                writeLog(`✅ Đã kết nối thành công! Phiên bản: ${data.version || 'unknown'}`, "info");
            } else {
                throw new Error("Phản hồi lỗi từ server");
            }
        } catch (e) {
            isConnected = false;
            document.getElementById("status-indicator").classList.remove("connected");
            writeLog(`❌ Lỗi kết nối: ${e.message}. Hãy kiểm tra xem Server trên Kaggle đã chạy và Ngrok đã mở cổng chưa.`, "error");
        }
    };

    // Initialize LiteGraph
    const graph = new LGraph();
    const canvas = new LGraphCanvas("#graphcanvas", graph);
    
    // Auto center/zoom
    canvas.background_image = null; // Let CSS handle background grid
    
    // =========================================================================
    // 1. CUSTOM NODE DEFINITIONS
    // =========================================================================

    // Node 1: Input Text Prompt
    function NodePrompt() {
        this.addOutput("prompt", "string");
        this.properties = {
            prompt: "a wooden dining chair next to a small wooden side table, product photography, plain dark background, studio lighting"
        };
        this.widget = this.addWidget("text", "Prompt", this.properties.prompt, (v) => {
            this.properties.prompt = v;
        });
        this.size = [320, 80];
    }
    NodePrompt.title = "Input Text Prompt";
    NodePrompt.prototype.onExecute = function() {
        this.setOutputData(0, this.properties.prompt);
    };
    LiteGraph.registerNodeType("datn/input_prompt", NodePrompt);


    // Node 2: Scene Graph Parser
    function NodeSceneGraph() {
        this.addInput("prompt", "string");
        this.addOutput("scene_graph", "object");
        this.properties = { graphData: null };
        this.size = [300, 160];
    }
    NodeSceneGraph.title = "Scene Graph Parser";
    NodeSceneGraph.prototype.onExecute = async function() {
        const inputPrompt = this.getInputData(0);
        if (!inputPrompt || !isConnected) return;
        
        // Caching to avoid duplicate requests in LiteGraph evaluation loops
        if (this._lastPrompt === inputPrompt && this.properties.graphData) {
            this.setOutputData(0, this.properties.graphData);
            return;
        }
        
        this._lastPrompt = inputPrompt;
        writeLog("Gửi prompt để phân tích cú pháp Scene Graph...", "system");
        
        try {
            const res = await fetch(`${backendUrl}/api/parse_scene_graph`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: inputPrompt })
            });
            if (res.ok) {
                const data = await res.json();
                this.properties.graphData = data;
                this.setOutputData(0, data);
                writeLog("✅ Đã nhận được cấu trúc Scene Graph!");
            }
        } catch (e) {
            writeLog(`❌ Lỗi phân tích Scene Graph: ${e.message}`, "error");
        }
    };
    NodeSceneGraph.prototype.onDrawForeground = function(ctx) {
        if (!this.properties.graphData) return;
        ctx.fillStyle = "#9ca3af";
        ctx.font = "10px sans-serif";
        ctx.fillText("Nodes (Vật thể):", 12, 50);
        
        const nodes = this.properties.graphData.nodes || [];
        nodes.forEach((n, idx) => {
            ctx.fillStyle = "#818cf8";
            ctx.fillText(`- [${n.id}] ${n.label} (${n.full})`, 20, 65 + (idx * 15));
        });
    };
    LiteGraph.registerNodeType("datn/scene_graph", NodeSceneGraph);


    // Node 3: 2D Layout Generator
    function NodeLayout2D() {
        this.addInput("scene_graph", "object");
        this.addOutput("layout", "object");
        this.properties = { layoutData: null };
        this.size = [320, 240];
    }
    NodeLayout2D.title = "2D Layout Generator";
    NodeLayout2D.prototype.onExecute = async function() {
        const graphData = this.getInputData(0);
        if (!graphData || !isConnected) return;
        
        if (this._lastGraph === graphData && this.properties.layoutData) {
            this.setOutputData(0, this.properties.layoutData);
            return;
        }
        
        this._lastGraph = graphData;
        writeLog("Tính toán bố cục hộp giới hạn 2D...", "system");
        
        try {
            const res = await fetch(`${backendUrl}/api/generate_layout`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(graphData)
            });
            if (res.ok) {
                const data = await res.json();
                this.properties.layoutData = data;
                this.setOutputData(0, data);
                writeLog("✅ Tính toán bố cục 2D xong!");
            }
        } catch (e) {
            writeLog(`❌ Lỗi tính toán Layout: ${e.message}`, "error");
        }
    };
    NodeLayout2D.prototype.onDrawForeground = function(ctx) {
        if (!this.properties.layoutData) return;
        const boxes = this.properties.layoutData.layout || {};
        
        // Renders visual preview inside node
        ctx.save();
        ctx.fillStyle = "#0d0d0f";
        ctx.fillRect(10, 40, 160, 160);
        ctx.strokeStyle = "#3f3f46";
        ctx.lineWidth = 1;
        ctx.strokeRect(10, 40, 160, 160);
        
        const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#ffeaa7"];
        let colorIdx = 0;
        
        for (const [nid, box] of Object.entries(boxes)) {
            // scale 512x512 down to 160x160 inside node
            const scale = 160 / 512;
            const bx = 10 + (box.x * scale);
            const by = 40 + (box.y * scale);
            const bw = box.w * scale;
            const bh = box.h * scale;
            
            const color = colors[colorIdx % colors.length];
            ctx.fillStyle = color + "22"; // opacity
            ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(bx, by, bw, bh);
            
            ctx.fillStyle = color;
            ctx.font = "8px sans-serif";
            ctx.fillText(nid, bx + 4, by + 12);
            colorIdx++;
        }
        
        ctx.fillStyle = "#e4e4e7";
        ctx.font = "10px sans-serif";
        ctx.fillText("Bố cục tọa độ 2D:", 180, 50);
        let textY = 65;
        for (const [nid, box] of Object.entries(boxes)) {
            ctx.fillText(`${nid}: x=${box.x}, y=${box.y}`, 180, textY);
            ctx.fillText(`    w=${box.w}, h=${box.h}`, 180, textY + 12);
            textY += 28;
        }
        ctx.restore();
    };
    LiteGraph.registerNodeType("datn/layout_2d", NodeLayout2D);


    // Node 4: SDXL + LoRA Image Generator
    function NodeSDXLGen() {
        this.addInput("layout", "object");
        this.addInput("prompt", "string");
        this.addOutput("image_url", "string");
        
        this.properties = {
            imageUrl: "",
            candidates: [],
            selectedIdx: 0,
            loraScale: 0.6
        };
        
        this.addWidget("number", "LoRA Scale", this.properties.loraScale, (v) => {
            this.properties.loraScale = v;
        }, { min: 0, max: 1, step: 0.1 });
        
        this.size = [360, 320];
    }
    NodeSDXLGen.title = "SDXL + LoRA Generator";
    NodeSDXLGen.prototype.onExecute = async function() {
        const layoutData = this.getInputData(0);
        const prompt = this.getInputData(1);
        if (!layoutData || !prompt || !isConnected) return;
        
        if (this._lastLayout === layoutData && this._lastPrompt === prompt && this.properties.imageUrl) {
            this.setOutputData(0, this.properties.imageUrl);
            return;
        }
        
        this._lastLayout = layoutData;
        this._lastPrompt = prompt;
        writeLog("Bắt đầu sinh ảnh 2D qua SDXL + ControlNet + LoRA (Khoảng 20 giây)...", "system");
        
        try {
            const res = await fetch(`${backendUrl}/api/generate_image`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    prompt: prompt,
                    layout: layoutData,
                    lora_scale: this.properties.loraScale
                })
            });
            if (res.ok) {
                const data = await res.json();
                // backend returns absolute or relative image url
                this.properties.imageUrl = `${backendUrl}${data.image_url}`;
                this.setOutputData(0, this.properties.imageUrl);
                writeLog("✅ Sinh ảnh 2D thành công!");
                
                // Trigger canvas redraw to show image
                this.setDirtyCanvas(true, true);
            }
        } catch (e) {
            writeLog(`❌ Lỗi sinh ảnh: ${e.message}`, "error");
        }
    };
    NodeSDXLGen.prototype.onDrawBackground = function(ctx) {
        if (!this.properties.imageUrl) return;
        
        // Draw the generated image inside the node
        if (!this._imageObj) {
            this._imageObj = new Image();
            this._imageObj.src = this.properties.imageUrl;
            this._imageObj.onload = () => this.setDirtyCanvas(true, true);
        }
        
        try {
            ctx.drawImage(this._imageObj, 15, 60, 330, 240);
            ctx.strokeStyle = "#4f46e5";
            ctx.lineWidth = 2;
            ctx.strokeRect(15, 60, 330, 240);
        } catch (e) {}
    };
    LiteGraph.registerNodeType("datn/sdxl_gen", NodeSDXLGen);


    // Node 5: Grounded-SAM2 Segment Node
    function NodeGroundedSAM2() {
        this.addInput("image_url", "string");
        this.addInput("layout", "object");
        this.addOutput("crops_data", "object");
        
        this.properties = { crops: [] };
        this.size = [360, 220];
    }
    NodeGroundedSAM2.title = "Grounded-SAM2 Segment";
    NodeGroundedSAM2.prototype.onExecute = async function() {
        const imageUrl = this.getInputData(0);
        const layoutData = this.getInputData(1);
        if (!imageUrl || !layoutData || !isConnected) return;
        
        if (this._lastImageUrl === imageUrl && this.properties.crops.length > 0) {
            this.setOutputData(0, this.properties.crops);
            return;
        }
        
        this._lastImageUrl = imageUrl;
        writeLog("Chạy GroundingDINO định vị và SAM2 để tách nền...", "system");
        
        try {
            const res = await fetch(`${backendUrl}/api/run_sam2`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    image_url: imageUrl,
                    layout: layoutData
                })
            });
            if (res.ok) {
                const data = await res.json();
                this.properties.crops = data.crops || [];
                this.setOutputData(0, this.properties.crops);
                writeLog(`✅ SAM2 hoàn tất tách nền thành công cho ${this.properties.crops.length} vật thể!`);
                
                // Clear loaded images cache to trigger reload
                this._cropImages = [];
                this.setDirtyCanvas(true, true);
            }
        } catch (e) {
            writeLog(`❌ Lỗi chạy SAM2: ${e.message}`, "error");
        }
    };
    NodeGroundedSAM2.prototype.onDrawBackground = function(ctx) {
        if (!this.properties.crops || this.properties.crops.length === 0) return;
        
        // Display crops side-by-side inside the node background
        if (!this._cropImages || this._cropImages.length === 0) {
            this._cropImages = [];
            this.properties.crops.forEach((crop, idx) => {
                const img = new Image();
                img.src = `${backendUrl}${crop.crop_url}`;
                img.onload = () => this.setDirtyCanvas(true, true);
                this._cropImages.push(img);
            });
        }
        
        const cardWidth = 100;
        const cardHeight = 100;
        const startX = 15;
        const startY = 60;
        
        this._cropImages.forEach((img, idx) => {
            const x = startX + (idx * (cardWidth + 15));
            const y = startY;
            
            // Draw card bg
            ctx.fillStyle = "#0d0d0f";
            ctx.fillRect(x, y, cardWidth, cardHeight);
            ctx.strokeStyle = "#3f3f46";
            ctx.strokeRect(x, y, cardWidth, cardHeight);
            
            // Draw transparent grid placeholder
            ctx.fillStyle = "#27272a";
            ctx.fillRect(x + 2, y + 2, cardWidth - 4, cardHeight - 4);
            
            try {
                ctx.drawImage(img, x + 2, y + 2, cardWidth - 4, cardHeight - 4);
            } catch (e) {}
            
            // Draw label
            ctx.fillStyle = "#e4e4e7";
            ctx.font = "9px sans-serif";
            const info = this.properties.crops[idx] || {};
            ctx.fillText(info.label || "unknown", x, y + cardHeight + 15);
        });
    };
    LiteGraph.registerNodeType("datn/grounded_sam2", NodeGroundedSAM2);


    // Node 6: TRELLIS 3D Generator
    function NodeTrellis3D() {
        this.addInput("crops_data", "object");
        this.addOutput("models_data", "object");
        this.properties = { models: [] };
        this.size = [360, 220];
    }
    NodeTrellis3D.title = "TRELLIS 3D Generator";
    NodeTrellis3D.prototype.onExecute = async function() {
        const cropsData = this.getInputData(0);
        if (!cropsData || !isConnected) return;
        
        if (this._lastCrops === cropsData && this.properties.models.length > 0) {
            this.setOutputData(0, this.properties.models);
            return;
        }
        
        this._lastCrops = cropsData;
        writeLog("Chạy mô hình TRELLIS dựng hình 3D thưa cho từng vật thể (Có thể mất 2-3 phút)...", "system");
        
        try {
            const res = await fetch(`${backendUrl}/api/generate_3d`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ crops: cropsData })
            });
            if (res.ok) {
                const data = await res.json();
                this.properties.models = data.models || [];
                this.setOutputData(0, this.properties.models);
                writeLog("✅ TRELLIS dựng 3D các vật thể thành công!");
                this.setDirtyCanvas(true, true);
            }
        } catch (e) {
            writeLog(`❌ Lỗi chạy TRELLIS: ${e.message}`, "error");
        }
    };
    NodeTrellis3D.prototype.onDrawForeground = function(ctx) {
        if (!this.properties.models || this.properties.models.length === 0) return;
        
        ctx.fillStyle = "#e4e4e7";
        ctx.font = "11px sans-serif";
        ctx.fillText("Kết quả Model 3D riêng lẻ (.glb):", 15, 60);
        
        this.properties.models.forEach((m, idx) => {
            ctx.fillStyle = "#818cf8";
            ctx.fillText(`✓ ${m.name} (${m.label}):`, 20, 80 + (idx * 30));
            ctx.fillStyle = "#9ca3af";
            ctx.font = "9px Courier";
            ctx.fillText(m.model_url.substring(0, 50) + "...", 25, 92 + (idx * 30));
            ctx.font = "11px sans-serif";
        });
    };
    LiteGraph.registerNodeType("datn/trellis_3d", NodeTrellis3D);


    // Node 7: 3D Scene Combiner (Renders actual 3D interactive preview)
    function NodeSceneCombiner() {
        this.addInput("models_data", "object");
        this.addInput("layout", "object");
        this.addOutput("scene_url", "string");
        this.properties = { sceneUrl: "", scaleFactor: 0.01 };
        
        this.addWidget("number", "Scale Factor", this.properties.scaleFactor, (v) => {
            this.properties.scaleFactor = v;
        }, { min: 0.001, max: 0.1, step: 0.005 });
        
        this.size = [380, 360];
    }
    NodeSceneCombiner.title = "3D Scene Combiner";
    NodeSceneCombiner.prototype.onExecute = async function() {
        const modelsData = this.getInputData(0);
        const layoutData = this.getInputData(1);
        if (!modelsData || !layoutData || !isConnected) return;
        
        if (this._lastModels === modelsData && this._lastLayout === layoutData && this.properties.sceneUrl) {
            this.setOutputData(0, this.properties.sceneUrl);
            return;
        }
        
        this._lastModels = modelsData;
        this._lastLayout = layoutData;
        writeLog("Đang chạy Trimesh ghép các mô hình 3D thành Scene chung...", "system");
        
        try {
            const res = await fetch(`${backendUrl}/api/combine_scene`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    models: modelsData,
                    layout: layoutData,
                    scale_factor: this.properties.scaleFactor
                })
            });
            if (res.ok) {
                const data = await res.json();
                this.properties.sceneUrl = `${backendUrl}${data.scene_url}`;
                this.setOutputData(0, this.properties.sceneUrl);
                writeLog("🎉 ĐÃ HOÀN TẤT pipeline! Đã dựng xong Scene 3D.");
                
                // Embed the interactive 3D model viewer dynamically inside DOM overlay
                this.update3DViewer();
            }
        } catch (e) {
            writeLog(`❌ Lỗi ghép cảnh: ${e.message}`, "error");
        }
    };
    
    // Updates interactive 3D viewer directly inside the Litegraph Canvas
    NodeSceneCombiner.prototype.update3DViewer = function() {
        if (!this.properties.sceneUrl) return;
        
        // Build html element overlay on top of node canvas
        const viewerId = `viewer-${this.id}`;
        let viewer = document.getElementById(viewerId);
        
        if (!viewer) {
            viewer = document.createElement("div");
            viewer.id = viewerId;
            viewer.className = "node-3d-container";
            viewer.style.position = "absolute";
            viewer.style.zIndex = 1000;
            viewer.style.border = "2px solid #818cf8";
            viewer.style.borderRadius = "4px";
            
            // Insert inside canvas container
            document.getElementById("canvas-container").appendChild(viewer);
        }
        
        // Render Google model-viewer element
        viewer.innerHTML = `
            <model-viewer 
                src="${this.properties.sceneUrl}" 
                camera-controls 
                auto-rotate 
                background-color="#08080a"
                alt="3D Scene Combined Output"
                style="width: 100%; height: 100%;">
            </model-viewer>
        `;
        
        this.position3DViewer();
    };

    NodeSceneCombiner.prototype.position3DViewer = function() {
        const viewerId = `viewer-${this.id}`;
        const viewer = document.getElementById(viewerId);
        if (!viewer) return;
        
        // Project node screen coordinates to align the HTML div on top of the node body
        const pos = this.getConnectionPos(true, 0); // node base pos helper
        const scale = canvas.ds.scale; // zoom factor
        const offset = canvas.ds.offset; // drag offset
        
        const nodeWidth = this.size[0];
        const nodeHeight = this.size[1];
        
        // Calculate dimensions and positions scaled
        const x = (this.pos[0] + 15) * scale + offset[0];
        const y = (this.pos[1] + 120) * scale + offset[1];
        const w = (nodeWidth - 30) * scale;
        const h = (nodeHeight - 145) * scale;
        
        viewer.style.left = `${x}px`;
        viewer.style.top = `${y}px`;
        viewer.style.width = `${w}px`;
        viewer.style.height = `${h}px`;
        
        // Hide viewer if node is hidden or zoomed out too far
        if (scale < 0.35) {
            viewer.style.display = "none";
        } else {
            viewer.style.display = "block";
        }
    };
    
    // Auto-update HTML overlay positions when drawing canvas (drag/zoom)
    const originalDraw = LGraphCanvas.prototype.draw;
    LGraphCanvas.prototype.draw = function() {
        originalDraw.apply(this, arguments);
        
        // update all combiner node views position
        const nodes = graph.findNodesByType("datn/scene_combiner");
        if (nodes && nodes.length > 0) {
            nodes.forEach(n => n.position3DViewer());
        }
    };
    
    // Remove overlay div when node is deleted
    NodeSceneCombiner.prototype.onRemoved = function() {
        const viewerId = `viewer-${this.id}`;
        const viewer = document.getElementById(viewerId);
        if (viewer) viewer.remove();
    };

    LiteGraph.registerNodeType("datn/scene_combiner", NodeSceneCombiner);

    // =========================================================================
    // 2. MAIN EXECUTION PIPELINE TRIGGER
    // =========================================================================

    // Create the default node template graph on load
    function setupDefaultGraph() {
        graph.clear();
        
        // Create nodes
        const nodePrompt = LiteGraph.createNode("datn/input_prompt");
        nodePrompt.pos = [50, 150];
        graph.add(nodePrompt);
        
        const nodeSceneGraph = LiteGraph.createNode("datn/scene_graph");
        nodeSceneGraph.pos = [420, 50];
        graph.add(nodeSceneGraph);
        
        const nodeLayout = LiteGraph.createNode("datn/layout_2d");
        nodeLayout.pos = [760, 50];
        graph.add(nodeLayout);
        
        const nodeSDXL = LiteGraph.createNode("datn/sdxl_gen");
        nodeSDXL.pos = [1120, 50];
        graph.add(nodeSDXL);
        
        const nodeSAM2 = LiteGraph.createNode("datn/grounded_sam2");
        nodeSAM2.pos = [1520, 50];
        graph.add(nodeSAM2);
        
        const nodeTrellis = LiteGraph.createNode("datn/trellis_3d");
        nodeTrellis.pos = [1920, 50];
        graph.add(nodeTrellis);
        
        const nodeCombiner = LiteGraph.createNode("datn/scene_combiner");
        nodeCombiner.pos = [2320, 50];
        graph.add(nodeCombiner);
        
        // Link nodes
        nodePrompt.connect(0, nodeSceneGraph, 0);
        nodePrompt.connect(0, nodeSDXL, 1);
        
        nodeSceneGraph.connect(0, nodeLayout, 0);
        
        nodeLayout.connect(0, nodeSDXL, 0);
        nodeLayout.connect(0, nodeSAM2, 1);
        nodeLayout.connect(0, nodeCombiner, 1);
        
        nodeSDXL.connect(0, nodeSAM2, 0);
        
        nodeSAM2.connect(0, nodeTrellis, 0);
        
        nodeTrellis.connect(0, nodeCombiner, 0);
        
        // Center view on canvas
        canvas.ds.offset = [50, 100];
        canvas.ds.scale = 0.75;
        writeLog("Đã tạo mặc định cấu trúc luồng pipeline.", "info");
    }

    // Run graph execution loop on click
    document.getElementById("btn-run").onclick = () => {
        if (!isConnected) {
            writeLog("Vui lòng kết nối với máy chủ Kaggle trước khi chạy!", "warning");
            return;
        }
        writeLog("🏁 Bắt đầu thực thi pipeline (Queue Prompt)...", "system");
        
        // Force LiteGraph to evaluate nodes from left to right
        graph.runStep();
    };

    // Initialize layout
    setupDefaultGraph();
</script>
</body>
